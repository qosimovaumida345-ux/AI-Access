name: Release Builds On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Build Desktop (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install dependencies
        working-directory: ./desktop-app
        run: npm install --no-audit --no-fund

      - name: Build and Distribute
        working-directory: ./desktop-app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.os }}
          path: |
            desktop-app/dist-electron/*.exe
            desktop-app/dist-electron/*.dmg
            desktop-app/dist-electron/*.deb
            desktop-app/dist-electron/*.AppImage

  mobile:
    name: Build Mobile APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile-app
        run: npm install --no-audit --no-fund

      - name: Build APK on EAS
        working-directory: ./mobile-app
        run: eas build --platform android --profile preview --non-interactive --wait --json > build.json

      - name: Download APK from build output
        working-directory: ./mobile-app
        shell: bash
        run: |
          APK_URL=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('build.json','utf8'));const build=Array.isArray(data)?data[0]:data;console.log(build?.artifacts?.buildUrl||'');")
          if [ -z "$APK_URL" ]; then
            echo "Could not find APK URL in build.json"
            exit 1
          fi
          curl -L "$APK_URL" -o ai-access.apk

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: mobile-app/ai-access.apk

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - desktop
      - mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp all-artifacts/desktop-artifacts-*/* release-assets/ || true
          cp all-artifacts/mobile-apk/ai-access.apk release-assets/ || true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 ShadowForge OS — Neural Access Assistant
            
            This release features a unified AI architecture and premium UI experience.
            
            ### ✨ Features
            - **Unified AI Brain**: Bridged Node.js with Python Agent Core.
            - **Full Device Access**: Integrated tools for system control (WiFi, Volume, Status).
            - **Premium UI**: Modern glassmorphism design with HUD-style exam overlay.
            - **Cross-Platform**: Builds for Windows, Linux, macOS, and Android.
            
            ### 🛠 Installation
            - **Desktop**: Download the artifact for your OS and install.
            - **Mobile**: Install the APK on your Android device.
            - **Backend**: Ensure you have Python 3.10+ and Node.js 20+ installed to run the local brain.
