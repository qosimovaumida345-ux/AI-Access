name: Release Builds On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Build Desktop EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install dependencies
        working-directory: ./desktop-app
        run: npm install --no-audit --no-fund

      - name: Build desktop release
        working-directory: ./desktop-app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-exe
          path: desktop-app/dist-electron/*.exe

  mobile:
    name: Build Mobile APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile-app
        run: npm install --no-audit --no-fund

      - name: Build APK on EAS
        working-directory: ./mobile-app
        run: eas build --platform android --profile preview --non-interactive --wait --json > build.json

      - name: Download APK from build output
        working-directory: ./mobile-app
        shell: bash
        run: |
          APK_URL=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('build.json','utf8'));const build=Array.isArray(data)?data[0]:data;console.log(build?.artifacts?.buildUrl||'');")
          if [ -z "$APK_URL" ]; then
            echo "Could not find APK URL in build.json"
            exit 1
          fi
          curl -L "$APK_URL" -o ai-access.apk

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: mobile-app/ai-access.apk

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - desktop
      - mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-exe
          path: release-assets

      - name: Download mobile artifact
        uses: actions/download-artifact@v4
        with:
          name: mobile-apk
          path: release-assets

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.exe
            release-assets/*.apk
          generate_release_notes: true
